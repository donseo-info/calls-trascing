<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Overlay Test</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #f0efe9;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: system-ui, sans-serif;
}

/* Вариант оверлей */
.v6 {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 8px;
}

/* Скрываем стандартную стрелку-кнопку */
.v6 .ct-phone-hint { display: none !important; }

/* Убираем маску с последних цифр — они будут полностью скрыты оверлеем */
.v6 .ct-phone-fade { -webkit-mask-image: none !important; mask-image: none !important; }

/* Кнопка «показать номер» */
.ct-overlay {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: #6c63ff;
  cursor: pointer;
  transition: opacity .3s ease;
}
.ct-overlay svg { flex-shrink: 0; }
</style>
</head>
<body>

<div class="v6" data-ct-phone="+79884007097"></div>

<script src="ct.js" data-api="api/assign.php" data-counter="107404488"></script>

<script>
document.addEventListener('DOMContentLoaded', function () {
  var EYE = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';

  var wrapper = document.querySelector('.v6');
  var widget  = wrapper.querySelector('[data-ct-widget]');
  if (!widget) return;

  var ov = document.createElement('div');
  ov.className = 'ct-overlay';
  ov.innerHTML = EYE + '&nbsp;показать номер';
  wrapper.appendChild(ov);

  ov.addEventListener('click', function (e) {
    e.stopPropagation();
    widget.dispatchEvent(new MouseEvent('click', { bubbles: true }));
  });

  new MutationObserver(function (_, obs) {
    if (widget.classList.contains('ct-revealed')) {
      ov.style.opacity = '0';
      ov.style.pointerEvents = 'none';
      obs.disconnect();
    }
  }).observe(widget, { attributes: true, attributeFilter: ['class'] });
});
</script>

</body>
</html>
