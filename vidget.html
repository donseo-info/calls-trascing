<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phone Reveal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Unbounded:wght@300;400;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #0f0f13;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Unbounded', sans-serif;
  }

  .demo-card {
    background: #17171f;
    border: 1px solid #2a2a38;
    border-radius: 20px;
    padding: 56px 72px;
    text-align: center;
    box-shadow: 0 40px 80px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    gap: 36px;
  }

  .label {
    font-size: 10px;
    letter-spacing: 0.25em;
    color: #444;
    text-transform: uppercase;
  }

  .phone-reveal {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    user-select: none;
  }

  .phone-number {
    font-family: 'JetBrains Mono', monospace;
    font-size: 32px;
    font-weight: 600;
    letter-spacing: 0.04em;
    display: inline-flex;
    align-items: center;
  }

  /* Видимая часть */
  .phone-visible {
    color: #d8d8e8;
    transition: color 0.4s ease, text-shadow 0.4s ease;
  }

  /* Скрытая часть — контейнер */
  .phone-hidden {
    position: relative;
    display: inline-block;
  }

  /* Текст под blur (реальные цифры) */
  .phone-hidden-text {
    color: #d8d8e8;
    display: inline-block;
    opacity: 0;
    filter: blur(8px);
    transform: translateY(3px);
    transition:
      opacity 0.55s cubic-bezier(0.34, 1.56, 0.64, 1),
      filter 0.45s ease,
      transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  /* Маска — тот же текст с градиентом fade */
  .phone-mask {
    position: absolute;
    left: 0; top: 0;
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
    transition: opacity 0.35s ease;
    pointer-events: none;
  }

  .phone-mask-inner {
    font-family: 'JetBrains Mono', monospace;
    font-size: 32px;
    font-weight: 600;
    letter-spacing: 0.04em;
    /* Слева видно, справа полностью прозрачно */
    background: linear-gradient(90deg,
      #c0c0d8 0%,
      #9090b8 25%,
      rgba(100,100,180,0.4) 60%,
      rgba(80,80,160,0.05) 85%,
      transparent 100%
    );
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    white-space: nowrap;
  }

  /* Иконка */
  .phone-hint {
    display: flex;
    align-items: center;
    gap: 8px;
    transition: opacity 0.3s ease, transform 0.3s ease;
    flex-shrink: 0;
  }

  .hint-icon {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(108,99,255,0.15), rgba(108,99,255,0.3));
    border: 1px solid rgba(108,99,255,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    animation: pulse-hint 2.4s ease-in-out infinite;
    transition: background 0.3s, border-color 0.3s, transform 0.25s;
  }

  .hint-icon svg {
    color: #9b8fff;
    transition: transform 0.3s ease, color 0.3s;
  }

  .hint-label {
    font-size: 9px;
    letter-spacing: 0.18em;
    color: #5555a0;
    text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
    transition: color 0.3s;
  }

  @keyframes pulse-hint {
    0%, 100% { box-shadow: 0 0 0 0 rgba(108,99,255,0.3); }
    50%       { box-shadow: 0 0 0 10px transparent; }
  }

  .phone-reveal:not(.revealed):hover .hint-icon {
    background: linear-gradient(135deg, rgba(108,99,255,0.3), rgba(108,99,255,0.5));
    border-color: #9b8fff;
    transform: scale(1.12);
  }
  .phone-reveal:not(.revealed):hover .hint-icon svg {
    transform: translateX(3px);
    color: #d0ccff;
  }
  .phone-reveal:not(.revealed):hover .hint-label { color: #8888cc; }

  /* Revealed */
  .phone-reveal.revealed .phone-hidden-text {
    opacity: 1;
    filter: blur(0);
    transform: translateY(0);
    text-shadow: 0 0 28px rgba(108,99,255,0.45);
  }
  .phone-reveal.revealed .phone-visible {
    color: #fff;
    text-shadow: 0 0 28px rgba(108,99,255,0.25);
  }
  .phone-reveal.revealed .phone-mask { opacity: 0; }
  .phone-reveal.revealed .phone-hint {
    opacity: 0;
    transform: translateX(10px);
    pointer-events: none;
  }

  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, #2a2a38, transparent);
  }

  .note {
    font-size: 9px;
    letter-spacing: 0.15em;
    color: #333;
    text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 14px;
  }

  .copy-toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(16px);
    background: #6c63ff;
    color: #fff;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    padding: 10px 28px;
    border-radius: 100px;
    opacity: 0;
    transition: opacity 0.3s ease, transform 0.3s ease;
    pointer-events: none;
  }
  .copy-toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<div class="demo-card">

  <div class="label">Calltracking · Reveal UI</div>

  <!-- Вариант А: иконка + подпись -->
  <div>
    <div class="note">Вариант А — иконка + подпись</div>
    <div class="phone-reveal" id="phone1" onclick="revealPhone(this, '+7 (938) 123-45-67')">
      <div class="phone-number">
        <span class="phone-visible">+7 (938) 123-</span>
        <span class="phone-hidden">
          <span class="phone-hidden-text">45-67</span>
          <span class="phone-mask">
            <span class="phone-mask-inner">45-67</span>
          </span>
        </span>
      </div>
      <div class="phone-hint">
        <div class="hint-icon">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14M13 6l6 6-6 6"/>
          </svg>
        </div>
        <span class="hint-label">показать</span>
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Вариант Б: только иконка -->
  <div>
    <div class="note">Вариант Б — только иконка</div>
    <div class="phone-reveal" id="phone2" onclick="revealPhone(this, '+7 (499) 987-65-43')">
      <div class="phone-number">
        <span class="phone-visible">+7 (499) 987-</span>
        <span class="phone-hidden">
          <span class="phone-hidden-text">65-43</span>
          <span class="phone-mask">
            <span class="phone-mask-inner">65-43</span>
          </span>
        </span>
      </div>
      <div class="phone-hint">
        <div class="hint-icon">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14M13 6l6 6-6 6"/>
          </svg>
        </div>
      </div>
    </div>
  </div>

</div>

<div class="copy-toast" id="toast">📋 Номер скопирован</div>

<script>
function revealPhone(el, fullNumber) {
  if (el.classList.contains('revealed')) {
    navigator.clipboard?.writeText(fullNumber);
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
    return;
  }
  el.classList.add('revealed');
}
</script>
</body>
</html>
